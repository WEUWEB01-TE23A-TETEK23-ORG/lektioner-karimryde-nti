<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facit: Ministry of silly walks</title>
    <style>
        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: #2c3e50;
            color: #ecf0f1;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            transition: background-color 0.5s ease; /* Mjuk övergång för färgbyten */
        }

        .container {
            background: #34495e;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 8px 15px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 600px;
        }

        #cleese-bild {
            width: 250px;
            border: 5px solid #ecf0f1;
            border-radius: 10px;
            margin: 20px 0;
            transition: transform 0.5s ease; 
        }

        .knapp-panel {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-bottom: 20px;
        }

        button {
            padding: 10px 15px;
            border: none;
            border-radius: 5px;
            background-color: #e74c3c;
            color: white;
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
        }

        button:hover {
            background-color: #c0392b;
        }

        .btn-boss {
            background-color: #8e44ad;
            font-size: 1.2rem;
            width: 100%;
            margin-top: 10px;
        }
        
        .btn-boss:hover {
            background-color: #732d91;
        }

        .video-lada {
            background-color: #2c3e50;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="huvudrubrik">Ministry of silly walks</h1>
        <p class="info-text">Hjälp John Cleese att få till den perfekta, galna gångstilen!</p>
        
        <img id="cleese-bild" src="https://upload.wikimedia.org/wikipedia/en/0/0d/Monty_Python%27s_The_Ministry_of_Silly_Walks_video_game_cover.jpeg" alt="John Cleese gör en silly walk">
        
        <audio id="silly-ljud" src="https://s3.amazonaws.com/freecodecamp/simonSound1.mp3"></audio>

        <div class="knapp-panel">
            <button onclick="roteraBild()">Rotera bilden</button>
            <button onclick="spelaLjud()">Spela ljud</button>
            <button onclick="visaVideo()">Visa originalklippet</button>
            <button onclick="spegelvand()">Spegelvänd</button>
            <button onclick="vanligPromenad()">Vanlig promenad</button>
            <button onclick="snurraVidare()">Snurra vidare!</button>
            <button class="btn-boss" onclick="sillyMode()">SILLY MODE</button>
        </div>

        <div class="video-lada" style="display: none;">
            <h2>Se originalet! 🎩</h2>
            <iframe width="100%" height="250" src="https://www.youtube.com/embed/5ptUMe9eqYE" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
        </div>
    </div>

    <script>
        // Övning & Uppgift 1: Rotera bilden (ändrad till 180 grader)
        function roteraBild() {
            document.querySelector("#cleese-bild").style.transform = "rotate(180deg)";
        }

        // Övning 2: Spela ljud
        function spelaLjud() {
            document.querySelector("#silly-ljud").play();
        }

        // Uppgift 2: Visa YouTube-klippet
        function visaVideo() {
            document.querySelector(".video-lada").style.display = "block";
        }

        // Uppgift 3: Spegelvänd bilden
        function spegelvand() {
            document.querySelector("#cleese-bild").style.transform = "scaleX(-1)";
        }

        // Uppgift 4: Byta ut bilden
        function vanligPromenad() {
            // Byter till en vanlig bild av John Cleese
            document.querySelector("#cleese-bild").src = "https://live-production.wcms.abc-cdn.net.au/10c4d571f8471f12a9a9da1019951b35?impolicy=wcms_crop_resize&cropH=361&cropW=642&xPos=120&yPos=0&width=862&height=485";
        }

        // Uppgift 5: Snurra mer för varje klick
        let vinkel = 0; // Variabeln skapas utanför funktionen

        function snurraVidare() {
            vinkel = vinkel + 45; // Ökar med 45 grader varje gång
            document.querySelector("#cleese-bild").style.transform = "rotate(" + vinkel + "deg)";
        }

        // Uppgift 6: The ultimate silly walk (Boss-nivå)
        function sillyMode() {
            // 1. Spela ljudet
            document.querySelector("#silly-ljud").play();
            
            // 2. Snurra bilden snabbt (två varv)
            document.querySelector("#cleese-bild").style.transform = "rotate(720deg)";
            
            // 3. Visa videon
            document.querySelector(".video-lada").style.display = "block";
            
            // 4. Byt ut texten
            document.querySelector(".info-text").textContent = "MINISTRY OF SILLY WALKS ÄR NU AKTIVERAT!";
            
            // 5. Byt bakgrundsfärg på hela sidan
            document.body.style.backgroundColor = "yellow";
            
            // 6. Ändra färg på huvudrubriken
            document.querySelector(".huvudrubrik").style.color = "black";
            // Extra fix för att texten inte ska försvinna mot den gula bakgrunden
            document.querySelector(".info-text").style.color = "black"; 
        }
    </script>
</body>
</html>
